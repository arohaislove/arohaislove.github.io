name: Deploy Cloudflare Workers

on:
  push:
    branches:
      - main
    paths:
      - 'workers/**'
      - '.github/workflows/deploy-workers.yml'
  workflow_dispatch: # Allow manual triggering

jobs:
  # Discover all worker directories
  find-workers:
    runs-on: ubuntu-latest
    outputs:
      workers: ${{ steps.get-workers.outputs.workers }}
      worker-count: ${{ steps.get-workers.outputs.count }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Find all workers
        id: get-workers
        run: |
          # Find all directories in workers/ (excluding hidden files)
          workers=$(find workers -mindepth 1 -maxdepth 1 -type d -exec basename {} \; | jq -R -s -c 'split("\n") | map(select(length > 0))')
          count=$(echo "$workers" | jq 'length')

          echo "workers=$workers" >> $GITHUB_OUTPUT
          echo "count=$count" >> $GITHUB_OUTPUT

          echo "📦 Found $count worker(s) to deploy:"
          echo "$workers" | jq -r '.[]' | sed 's/^/  - /'

  # Deploy all discovered workers
  deploy:
    needs: find-workers
    runs-on: ubuntu-latest
    if: needs.find-workers.outputs.worker-count > 0

    strategy:
      matrix:
        worker: ${{ fromJson(needs.find-workers.outputs.workers) }}
      fail-fast: false  # Continue deploying other workers even if one fails

    name: Deploy ${{ matrix.worker }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Check if secrets are needed
        id: check-secrets
        env:
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          # Check if worker code references ANTHROPIC_API_KEY
          if grep -q "ANTHROPIC_API_KEY" workers/${{ matrix.worker }}/index.js 2>/dev/null; then
            echo "needs-anthropic-key=true" >> $GITHUB_OUTPUT
            echo "🔑 Worker uses ANTHROPIC_API_KEY - will configure secret"
          else
            echo "needs-anthropic-key=false" >> $GITHUB_OUTPUT
            echo "ℹ️  Worker does not use ANTHROPIC_API_KEY - skipping secret configuration"
          fi

          # Check if worker code references ELEVENLABS_API_KEY
          if grep -q "ELEVENLABS_API_KEY" workers/${{ matrix.worker }}/index.js 2>/dev/null; then
            echo "needs-elevenlabs-key=true" >> $GITHUB_OUTPUT
            echo "🔑 Worker uses ELEVENLABS_API_KEY - will configure secret"
          else
            echo "needs-elevenlabs-key=false" >> $GITHUB_OUTPUT
            echo "ℹ️  Worker does not use ELEVENLABS_API_KEY - skipping secret configuration"
          fi

          # Check if worker code references AUTH_TOKEN
          if grep -q "AUTH_TOKEN" workers/${{ matrix.worker }}/index.js 2>/dev/null; then
            echo "needs-auth-token=true" >> $GITHUB_OUTPUT
            echo "🔑 Worker uses AUTH_TOKEN - will configure secret"
          else
            echo "needs-auth-token=false" >> $GITHUB_OUTPUT
            echo "ℹ️  Worker does not use AUTH_TOKEN - skipping secret configuration"
          fi

          # Check if worker code references NTFY_TOPIC
          if grep -q "NTFY_TOPIC" workers/${{ matrix.worker }}/index.js 2>/dev/null; then
            echo "needs-ntfy-topic=true" >> $GITHUB_OUTPUT
            echo "🔑 Worker uses NTFY_TOPIC - will configure secret"
          else
            echo "needs-ntfy-topic=false" >> $GITHUB_OUTPUT
            echo "ℹ️  Worker does not use NTFY_TOPIC - skipping secret configuration"
          fi

          # Check if worker code references GOOGLE_SERVICE_ACCOUNT_KEY
          if grep -q "GOOGLE_SERVICE_ACCOUNT_KEY" workers/${{ matrix.worker }}/index.js 2>/dev/null; then
            echo "needs-google-sa-key=true" >> $GITHUB_OUTPUT
            echo "🔑 Worker uses GOOGLE_SERVICE_ACCOUNT_KEY - will configure secret"
          else
            echo "needs-google-sa-key=false" >> $GITHUB_OUTPUT
            echo "ℹ️  Worker does not use GOOGLE_SERVICE_ACCOUNT_KEY - skipping secret configuration"
          fi

          # Check if worker code references SPREADSHEET_ID
          if grep -q "SPREADSHEET_ID" workers/${{ matrix.worker }}/index.js 2>/dev/null; then
            echo "needs-spreadsheet-id=true" >> $GITHUB_OUTPUT
            echo "🔑 Worker uses SPREADSHEET_ID - will configure secret"
          else
            echo "needs-spreadsheet-id=false" >> $GITHUB_OUTPUT
            echo "ℹ️  Worker does not use SPREADSHEET_ID - skipping secret configuration"
          fi

          # Check if worker code references APPS_SCRIPT_URL
          if grep -q "APPS_SCRIPT_URL" workers/${{ matrix.worker }}/index.js 2>/dev/null; then
            echo "needs-apps-script-url=true" >> $GITHUB_OUTPUT
            echo "🔑 Worker uses APPS_SCRIPT_URL - will configure secret"
          else
            echo "needs-apps-script-url=false" >> $GITHUB_OUTPUT
            echo "ℹ️  Worker does not use APPS_SCRIPT_URL - skipping secret configuration"
          fi

          # Check if worker code references GMAIL_REFRESH_TOKEN
          if grep -q "GMAIL_REFRESH_TOKEN" workers/${{ matrix.worker }}/index.js 2>/dev/null; then
            echo "needs-gmail-refresh-token=true" >> $GITHUB_OUTPUT
            echo "🔑 Worker uses GMAIL_REFRESH_TOKEN - will configure secret"
          else
            echo "needs-gmail-refresh-token=false" >> $GITHUB_OUTPUT
            echo "ℹ️  Worker does not use GMAIL_REFRESH_TOKEN - skipping secret configuration"
          fi

          # Check if worker code references YOUTUBE_REFRESH_TOKEN
          if grep -q "YOUTUBE_REFRESH_TOKEN" workers/${{ matrix.worker }}/index.js 2>/dev/null; then
            echo "needs-youtube-refresh-token=true" >> $GITHUB_OUTPUT
            echo "🔑 Worker uses YOUTUBE_REFRESH_TOKEN - will configure secret"
          else
            echo "needs-youtube-refresh-token=false" >> $GITHUB_OUTPUT
            echo "ℹ️  Worker does not use YOUTUBE_REFRESH_TOKEN - skipping secret configuration"
          fi

          # Check if worker code references GOOGLE_CLIENT_ID
          if grep -q "GOOGLE_CLIENT_ID" workers/${{ matrix.worker }}/index.js 2>/dev/null; then
            echo "needs-google-client-id=true" >> $GITHUB_OUTPUT
            echo "🔑 Worker uses GOOGLE_CLIENT_ID - will configure secret"
          else
            echo "needs-google-client-id=false" >> $GITHUB_OUTPUT
            echo "ℹ️  Worker does not use GOOGLE_CLIENT_ID - skipping secret configuration"
          fi

          # Check if worker code references GOOGLE_CLIENT_SECRET
          if grep -q "GOOGLE_CLIENT_SECRET" workers/${{ matrix.worker }}/index.js 2>/dev/null; then
            echo "needs-google-client-secret=true" >> $GITHUB_OUTPUT
            echo "🔑 Worker uses GOOGLE_CLIENT_SECRET - will configure secret"
          else
            echo "needs-google-client-secret=false" >> $GITHUB_OUTPUT
            echo "ℹ️  Worker does not use GOOGLE_CLIENT_SECRET - skipping secret configuration"
          fi

          # Check if optional secrets are actually configured (env vars set in step env above)
          [ -n "$GMAIL_REFRESH_TOKEN" ] && echo "has-gmail-token=true" >> $GITHUB_OUTPUT || echo "has-gmail-token=false" >> $GITHUB_OUTPUT
          [ -n "$YOUTUBE_REFRESH_TOKEN" ] && echo "has-youtube-token=true" >> $GITHUB_OUTPUT || echo "has-youtube-token=false" >> $GITHUB_OUTPUT
          [ -n "$GOOGLE_CLIENT_ID" ] && echo "has-google-client-id=true" >> $GITHUB_OUTPUT || echo "has-google-client-id=false" >> $GITHUB_OUTPUT
          [ -n "$GOOGLE_CLIENT_SECRET" ] && echo "has-google-client-secret=true" >> $GITHUB_OUTPUT || echo "has-google-client-secret=false" >> $GITHUB_OUTPUT

      - name: Set ANTHROPIC_API_KEY secret
        if: steps.check-secrets.outputs.needs-anthropic-key == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          cd workers/${{ matrix.worker }}
          echo "${{ secrets.ANTHROPIC_API_KEY }}" | wrangler secret put ANTHROPIC_API_KEY

      - name: Set ELEVENLABS_API_KEY secret
        if: steps.check-secrets.outputs.needs-elevenlabs-key == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          cd workers/${{ matrix.worker }}
          echo "${{ secrets.ELEVENLABS_API_KEY }}" | wrangler secret put ELEVENLABS_API_KEY

      - name: Set AUTH_TOKEN secret
        if: steps.check-secrets.outputs.needs-auth-token == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          cd workers/${{ matrix.worker }}
          echo "${{ secrets.AUTH_TOKEN }}" | wrangler secret put AUTH_TOKEN

      - name: Set NTFY_TOPIC secret
        if: steps.check-secrets.outputs.needs-ntfy-topic == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          cd workers/${{ matrix.worker }}
          echo "${{ secrets.NTFY_TOPIC }}" | wrangler secret put NTFY_TOPIC

      - name: Set GOOGLE_SERVICE_ACCOUNT_KEY secret
        if: steps.check-secrets.outputs.needs-google-sa-key == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          cd workers/${{ matrix.worker }}
          echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}' | wrangler secret put GOOGLE_SERVICE_ACCOUNT_KEY

      - name: Set SPREADSHEET_ID secret
        if: steps.check-secrets.outputs.needs-spreadsheet-id == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          cd workers/${{ matrix.worker }}
          echo "${{ secrets.SPREADSHEET_ID }}" | wrangler secret put SPREADSHEET_ID

      - name: Set APPS_SCRIPT_URL secret
        if: steps.check-secrets.outputs.needs-apps-script-url == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          cd workers/${{ matrix.worker }}
          echo "${{ secrets.APPS_SCRIPT_URL }}" | wrangler secret put APPS_SCRIPT_URL

      - name: Set GMAIL_REFRESH_TOKEN secret
        if: steps.check-secrets.outputs.needs-gmail-refresh-token == 'true' && steps.check-secrets.outputs.has-gmail-token == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          cd workers/${{ matrix.worker }}
          echo "${{ secrets.GMAIL_REFRESH_TOKEN }}" | wrangler secret put GMAIL_REFRESH_TOKEN

      - name: Set YOUTUBE_REFRESH_TOKEN secret
        if: steps.check-secrets.outputs.needs-youtube-refresh-token == 'true' && steps.check-secrets.outputs.has-youtube-token == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          cd workers/${{ matrix.worker }}
          echo "${{ secrets.YOUTUBE_REFRESH_TOKEN }}" | wrangler secret put YOUTUBE_REFRESH_TOKEN

      - name: Set GOOGLE_CLIENT_ID secret
        if: steps.check-secrets.outputs.needs-google-client-id == 'true' && steps.check-secrets.outputs.has-google-client-id == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          cd workers/${{ matrix.worker }}
          echo "${{ secrets.GOOGLE_CLIENT_ID }}" | wrangler secret put GOOGLE_CLIENT_ID

      - name: Set GOOGLE_CLIENT_SECRET secret
        if: steps.check-secrets.outputs.needs-google-client-secret == 'true' && steps.check-secrets.outputs.has-google-client-secret == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          cd workers/${{ matrix.worker }}
          echo "${{ secrets.GOOGLE_CLIENT_SECRET }}" | wrangler secret put GOOGLE_CLIENT_SECRET

      - name: Deploy worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          cd workers/${{ matrix.worker }}
          wrangler deploy

      - name: Deployment summary
        run: |
          echo "✅ Worker '${{ matrix.worker }}' deployed successfully!"
          echo "🌐 Worker URL: https://${{ matrix.worker }}.zammel.workers.dev"

  # Summary of all deployments
  summary:
    needs: [find-workers, deploy]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Deployment summary
        run: |
          echo "🎉 Deployment complete!"
          echo "📦 Total workers deployed: ${{ needs.find-workers.outputs.worker-count }}"
          echo ""
          echo "Workers:"
          echo '${{ needs.find-workers.outputs.workers }}' | jq -r '.[] | "  ✓ https://\(.).zammel.workers.dev"'
